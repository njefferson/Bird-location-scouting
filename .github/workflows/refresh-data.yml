# Refresh the real eBird frequency data — fully iPad-drivable.
#
# eBird's bar-chart endpoint is login-gated, so this needs your eBird session
# cookie stored as the EBIRD_COOKIE repository secret (Settings → Secrets and
# variables → Actions). Grab the cookie on any device — on iPad, the Safari
# copy-to-clipboard bookmarklet in frame/HANDOFF.md does it in one tap on a
# signed-in ebird.org page (it alerts the character count so a truncated
# copy is obvious).
#
# What the runner does:
#   1. VALIDATE — resolve every curated species name against the live eBird
#      taxonomy. Fails fast (before any download) if a name is wrong, so bad
#      data can never ship. Only needs EBIRD_API_TOKEN.
#   2. BUILD — for EVERY county in src/data/counties.js (all 58 CA + the 5
#      Tahoe/Reno NV counties), enumerate its top hotspots and download their
#      bar charts, writing frame/data/counties/<code>.json + refreshing
#      frame/data/taxonomy.json. Statewide is ~1,050 polite requests, ~20 min —
#      the point is that any county added to a region later (or picked on the
#      v13 county map) already has real data waiting.
#   3. COMMIT the changed data to main (ignoring builtAt-only diffs) and DEPLOY.
#      (Deploy is inline because GITHUB_TOKEN pushes don't trigger deploy.yml.)
#
# If a run dies partway (e.g. the cookie expires mid-build), re-run it with
# "Resume partial run" checked — already-built counties are skipped.
#
# Runs quarterly (eBird frequency is a multi-year average) and on demand from
# the Actions tab. Note GitHub pauses cron schedules after ~60 days without
# repo activity — the manual "Run workflow" button is the reliable path.
name: Refresh eBird data

on:
  workflow_dispatch:
    inputs:
      resume:
        description: 'Resume partial run (skip counties already built) instead of rebuilding all fresh'
        type: boolean
        default: false
  schedule:
    - cron: '0 14 1 */3 *'   # 1st of Jan/Apr/Jul/Oct, 06:00/07:00 Pacific
  # PUSH-TO-TRIGGER: creating/bumping .github/trigger/refresh-data on a
  # claude/* working branch fires this run — so the Claude session can start a
  # refresh with plain `git push`, needing neither the Actions UI button nor
  # any GitHub API access. A commit message containing [resume] runs in resume
  # mode (skip already-built counties). The run itself still checks out and
  # commits MAIN, regardless of which branch carried the trigger.
  push:
    branches: [ 'claude/**' ]
    paths: [ '.github/trigger/refresh-data' ]

# Never two refreshes at once (a trigger during a running build queues instead).
concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          # 22+: the scripts import ESM from .js files without a package.json,
          # which relies on Node's module-syntax detection.
          node-version: 22

      - name: Validate species names against the eBird taxonomy
        env:
          EBIRD_API_TOKEN: ${{ secrets.EBIRD_API_TOKEN }}
        run: |
          if [ -z "$EBIRD_API_TOKEN" ]; then
            echo "::error::No EBIRD_API_TOKEN secret — needed to resolve species codes and hotspot lists. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          node frame/scripts/build-counties.mjs validate

      - name: Build county data files (statewide)
        env:
          EBIRD_API_TOKEN: ${{ secrets.EBIRD_API_TOKEN }}
          EBIRD_COOKIE: ${{ secrets.EBIRD_COOKIE }}
          RESUME: ${{ inputs.resume || contains(github.event.head_commit.message, '[resume]') }}
        run: |
          if [ -z "$EBIRD_COOKIE" ]; then
            echo "::error::No EBIRD_COOKIE secret. Sign into ebird.org, copy document.cookie (bookmarklet on iPad — see frame/HANDOFF.md), and save it as the EBIRD_COOKIE repository secret."
            exit 1
          fi
          if [ "$RESUME" = "true" ]; then
            echo "Resuming: counties with existing files are skipped."
            node frame/scripts/build-counties.mjs build
          else
            node frame/scripts/build-counties.mjs build --force
          fi

      # Runs even when the build step fails partway (cookie death): county files
      # are only ever written COMPLETE, so committing the finished ones preserves
      # progress — a later "resume" run skips them and picks up where this died.
      - name: Commit if the data changed
        id: commit
        if: ${{ !cancelled() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frame/data/counties frame/data/taxonomy.json
          # -I ignores the per-file builtAt stamp, which changes on every run.
          if git diff --staged --quiet -I'"builtAt"'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No real data changes (only builtAt stamps) — skipping commit and deploy."
          else
            git commit -m "Refresh eBird county data + taxonomy (automated)"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frame
          command: pages deploy . --project-name=bird-location-scouting --branch=main --commit-dirty=true
