# Refresh the real eBird frequency data — fully iPad-drivable.
#
# eBird's bar-chart endpoint is login-gated, so this needs your eBird session
# cookie stored as the EBIRD_COOKIE repository secret (Settings → Secrets and
# variables → Actions). Grab the cookie on any device — on iPad, a Safari
# bookmarklet works: javascript:prompt('eBird cookie',document.cookie) on an
# ebird.org page while signed in. See frame/HANDOFF.md for the full procedure.
#
# The runner downloads all 30 bar charts, rebuilds frame/data/reference.json,
# commits it to main if the data actually changed, and deploys to Cloudflare.
# (The deploy step is inline because pushes made with GITHUB_TOKEN deliberately
# do not trigger other workflows, so deploy.yml would not fire.)
#
# Runs quarterly (eBird frequency is a multi-year average) and on demand from
# the Actions tab. Note GitHub pauses cron schedules after ~60 days without
# repo activity — the manual "Run workflow" button is the reliable path.
name: Refresh eBird data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 1 */3 *'   # 1st of Jan/Apr/Jul/Oct, 06:00/07:00 Pacific

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          # 22+: the scripts import ESM from .js files without a package.json,
          # which relies on Node's module-syntax detection.
          node-version: 22

      - name: Download bar charts from eBird
        env:
          EBIRD_COOKIE: ${{ secrets.EBIRD_COOKIE }}
        run: |
          if [ -z "$EBIRD_COOKIE" ]; then
            echo "::error::No EBIRD_COOKIE secret. Sign into ebird.org, copy document.cookie (bookmarklet on iPad — see frame/HANDOFF.md), and save it as the EBIRD_COOKIE repository secret."
            exit 1
          fi
          node frame/scripts/download-barcharts.mjs ./barcharts
          COUNT=$(ls barcharts/*.tsv 2>/dev/null | wc -l)
          echo "Downloaded $COUNT bar-chart TSV(s)."
          if [ "$COUNT" -lt 25 ]; then
            echo "::error::Only $COUNT/30 bar charts downloaded — the eBird cookie has probably expired. Copy a fresh document.cookie from a signed-in ebird.org page, update the EBIRD_COOKIE secret, and re-run this workflow."
            exit 1
          fi

      - name: Rebuild reference.json
        run: node frame/scripts/build-reference.mjs localbarcharts ./barcharts

      - name: Commit if the data changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frame/data/reference.json
          # -I ignores the builtAt stamp, which changes on every run.
          if git diff --staged --quiet -I'"builtAt"'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No real data changes (only the builtAt stamp) — skipping commit and deploy."
          else
            git commit -m "Refresh eBird frequency + checklist data (automated)"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frame
          command: pages deploy . --project-name=bird-location-scouting --branch=main --commit-dirty=true
