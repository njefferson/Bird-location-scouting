# Refresh the real eBird frequency data — fully iPad-drivable.
#
# eBird's bar-chart endpoint is login-gated, so this needs your eBird session
# cookie stored as the EBIRD_COOKIE repository secret (Settings → Secrets and
# variables → Actions). The cookie is HttpOnly, so no bookmarklet or page
# script can ever read it (proven 2026-07-05) — the ONLY way to capture it is
# a desktop browser: DevTools → Network → any ebird.org request → Request
# Headers → copy the whole `cookie:` value. Multi-line pastes are fine; they
# are joined below.
#
# What the runner does:
#   1. VALIDATE — resolve every curated species name against the live eBird
#      taxonomy. Fails fast (before any download) if a name is wrong, so bad
#      data can never ship. Only needs EBIRD_API_TOKEN.
#   2. BUILD — for EVERY county in src/data/counties.js (all 58 CA + the 5
#      Tahoe/Reno NV counties), enumerate its top hotspots and download their
#      bar charts, writing frame/data/counties/<code>.json + refreshing
#      frame/data/taxonomy.json. The four featured counties are built first and
#      at full depth (every hotspot, not just the top 15), so a statewide run
#      is ~2,300 polite requests over ~4.5 hours (measured 2026-07-15) — the
#      point is that any county added to a region later (or picked on the
#      v13 county map) already has real data waiting.
#   3. COMMIT the changed data to main (ignoring builtAt-only diffs) and DEPLOY.
#      (Deploy is inline because GITHUB_TOKEN pushes don't trigger deploy.yml.)
#
# If a run dies partway (e.g. the cookie expires mid-build), re-run it with
# "Resume partial run" checked — already-built counties are skipped.
#
# Runs quarterly (eBird frequency is a multi-year average) and on demand from
# the Actions tab. Note GitHub pauses cron schedules after ~60 days without
# repo activity — the manual "Run workflow" button is the reliable path.
name: Refresh eBird data

on:
  workflow_dispatch:
    inputs:
      resume:
        description: 'Resume partial run (skip counties already built) instead of rebuilding all fresh'
        type: boolean
        default: false
      scope:
        description: 'Optional: space-separated county codes (e.g. "US-CA-043 US-CA-109") to force-rebuild JUST those counties — minutes instead of hours. Empty = full statewide run.'
        type: string
        default: ''
  schedule:
    - cron: '0 14 1 */3 *'   # 1st of Jan/Apr/Jul/Oct, 06:00/07:00 Pacific
  # PUSH-TO-TRIGGER: creating/bumping .github/trigger/refresh-data on a
  # claude/* working branch fires this run — so the Claude session can start a
  # refresh with plain `git push`, needing neither the Actions UI button nor
  # any GitHub API access. A commit message containing [resume] runs in resume
  # mode (skip already-built counties). The run itself still checks out and
  # commits MAIN, regardless of which branch carried the trigger.
  push:
    branches: [ 'claude/**' ]
    paths: [ '.github/trigger/refresh-data' ]

# Never two refreshes at once (a trigger during a running build queues instead).
concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # For push triggers, require the HEAD commit of the push to be the trigger
    # bump itself. Without this, any push whose range happens to contain an old
    # trigger commit re-fires the build — seen live 2026-07-15, when a session
    # rewrote branch history and a docs-only push nearly started a second
    # multi-hour statewide rebuild (only the dead cookie's fast-fail stopped it).
    if: >-
      github.event_name != 'push' ||
      contains(toJSON(github.event.head_commit.modified), '.github/trigger/refresh-data') ||
      contains(toJSON(github.event.head_commit.added), '.github/trigger/refresh-data')
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          # 22+: the scripts import ESM from .js files without a package.json,
          # which relies on Node's module-syntax detection.
          node-version: 22

      - name: Validate species names against the eBird taxonomy
        env:
          EBIRD_API_TOKEN: ${{ secrets.EBIRD_API_TOKEN }}
        run: |
          if [ -z "$EBIRD_API_TOKEN" ]; then
            echo "::error::No EBIRD_API_TOKEN secret — needed to resolve species codes and hotspot lists. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          node frame/scripts/build-counties.mjs validate

      - name: Build county data files (statewide)
        env:
          EBIRD_API_TOKEN: ${{ secrets.EBIRD_API_TOKEN }}
          EBIRD_COOKIE: ${{ secrets.EBIRD_COOKIE }}
          RESUME: ${{ inputs.resume || contains(github.event.head_commit.message, '[resume]') }}
          TRIGGER_MSG: ${{ github.event.head_commit.message }}
          SCOPE_INPUT: ${{ inputs.scope }}
        run: |
          if [ -z "$EBIRD_COOKIE" ]; then
            echo "::error::No EBIRD_COOKIE secret. On a DESKTOP browser signed into ebird.org: DevTools → Network → any ebird.org request → Request Headers → copy the whole 'cookie:' value, then save it as the EBIRD_COOKIE repository secret. (The cookie is HttpOnly — no bookmarklet or page script can read it.)"
            exit 1
          fi
          # The cookie secret may be pasted as one name=value pair per line (how
          # some DevTools views present it). A newline is an invalid HTTP header
          # value, so rebuild it into a single "a=1; b=2" line before use.
          # NEVER echo the value — the transformed string is no longer masked.
          EBIRD_COOKIE=$(printf '%s\n' "$EBIRD_COOKIE" | tr -d '\r' | awk '
            { sub(/^[Cc][Oo][Oo][Kk][Ii][Ee]:[ \t]*/, ""); gsub(/[ \t]+$/, ""); gsub(/;+$/, "");
              if ($0 == "") next; if (n++) printf "; "; printf "%s", $0 }')
          export EBIRD_COOKIE
          # (The script itself also joins a multi-line cookie and builds the
          # full-depth featured counties first — the shell join above just
          # keeps this workflow safe even against an older checked-out script.)
          #
          # SCOPED REBUILD: force-rebuild JUST the named counties — minutes
          # instead of ~4.5 h, and the existing files stay live until each is
          # overwritten complete. Two ways to name them, NEVER the schedule
          # (the quarterly statewide run can't be silently narrowed):
          #   - workflow_dispatch: the `scope` input (the reliable channel).
          #   - push-trigger: a line STARTING with "scope:" in the trigger
          #     commit's message (like [resume] — the run checks out main, so
          #     the message, not the trigger branch's files, must carry it).
          #     Via env, never inline-interpolated: commit messages are
          #     attacker-ish input. A code merely mentioned in prose doesn't
          #     count — only a "scope:" line does. NB the session git relay
          #     has been seen dropping head_commit metadata (probe guard
          #     skipped, 2026-07-18), so prefer the dispatch input.
          SCOPE=""
          if [ "${{ github.event_name }}" = "push" ]; then
            SCOPE=$(printf '%s\n' "$TRIGGER_MSG" | grep -iE '^scope:' | grep -oE 'US-[A-Z]{2}-[0-9]{3}' | sort -u | tr '\n' ' ')
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SCOPE=$(printf '%s\n' "$SCOPE_INPUT" | grep -oE 'US-[A-Z]{2}-[0-9]{3}' | sort -u | tr '\n' ' ')
          fi
          if [ -n "$SCOPE" ]; then
            echo "Scoped rebuild: $SCOPE"
            node frame/scripts/build-counties.mjs build --force $SCOPE
          elif [ "$RESUME" = "true" ]; then
            echo "Resuming: counties with existing files are skipped."
            node frame/scripts/build-counties.mjs build
          else
            node frame/scripts/build-counties.mjs build --force
          fi

      # Runs even when the build step fails partway (cookie death): county files
      # are only ever written COMPLETE, so committing the finished ones preserves
      # progress — a later "resume" run skips them and picks up where this died.
      - name: Commit if the data changed
        id: commit
        if: ${{ !cancelled() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frame/data/counties frame/data/taxonomy.json
          # -I ignores the per-file builtAt stamp, which changes on every run.
          if git diff --staged --quiet -I'"builtAt"'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No real data changes (only builtAt stamps) — skipping commit and deploy."
          else
            git commit -m "Refresh eBird county data + taxonomy (automated)"
            # Main may move during the multi-hour build (a merge, the keepalive
            # heartbeat) — a plain push would then fail non-fast-forward and
            # lose the whole run. Only this workflow ever writes the data
            # files, so a rebase is clean; retry a few times before giving up.
            pushed=false
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main && git push origin main; then
                pushed=true; break
              fi
              echo "Push attempt $i failed — retrying in $((10*i))s"
              sleep $((10*i))
            done
            if [ "$pushed" != "true" ]; then
              echo "::error::Could not push the refreshed data to main after 5 attempts — this run's data could not be saved. Resolve whatever is blocking pushes to main, then re-run the refresh."
              exit 1
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frame
          command: pages deploy . --project-name=bird-location-scouting --branch=main --commit-dirty=true
