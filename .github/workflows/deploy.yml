# Standalone deploy for the NEW repo (njefferson/Bird-location-scouting).
# Place this at .github/workflows/deploy.yml in that repo. It publishes frame/
# as its OWN Cloudflare Pages project (bird-location-scouting.pages.dev), with
# the eBird proxy mounted at /api/ebird. Needs three repo secrets:
#   CLOUDFLARE_API_TOKEN  (the account-wide Pages:Edit token you just made)
#   CLOUDFLARE_ACCOUNT_ID
#   EBIRD_API_TOKEN       (optional — turns on the live sightings overlay)
name: Deploy Frame to Cloudflare Pages

# main -> production (bird-location-scouting.pages.dev)
# any other listed branch -> a Cloudflare PREVIEW deployment
# (https://<branch>.bird-location-scouting.pages.dev), leaving production untouched.
on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:

# One deploy per branch at a time; a newer push supersedes an in-flight one so
# two runs can't finish out of order and leave production serving an older build.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Ensure Pages project exists
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create bird-location-scouting --production-branch=main

      - name: Set eBird API token secret
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EBIRD_API_TOKEN: ${{ secrets.EBIRD_API_TOKEN }}
        run: |
          if [ -n "$EBIRD_API_TOKEN" ]; then
            printf '%s' "$EBIRD_API_TOKEN" | npx -y wrangler@3 pages secret put EBIRD_API_TOKEN --project-name=bird-location-scouting
          else
            echo "No EBIRD_API_TOKEN secret — deploying without the live overlay."
          fi

      # Deploy from INSIDE frame/ so wrangler reliably finds frame/functions as
      # ./functions (it resolves the Functions dir relative to the working
      # directory, not the deploy-target argument). publishing "." = frame/.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frame
          # branch=main is the production branch; any other branch publishes a preview.
          command: pages deploy . --project-name=bird-location-scouting --branch=${{ github.ref_name }} --commit-dirty=true
