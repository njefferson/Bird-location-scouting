# Diagnostic: checks whether the stored EBIRD_COOKIE is a live signed-in
# session by fetching one hotspot's bar chart several ways and dumping the raw
# responses to the log. ~15 seconds; harmless; run it before a 20-minute build
# whenever the cookie's freshness is in doubt.
name: Probe eBird endpoint

on:
  workflow_dispatch:
  # PUSH-TO-TRIGGER (see refresh-data.yml): bump .github/trigger/probe-ebird on
  # a claude/* branch to fire this with plain `git push` — no UI, no API.
  push:
    branches: [ 'claude/**' ]
    paths: [ '.github/trigger/probe-ebird' ]

jobs:
  probe:
    runs-on: ubuntu-latest
    # Push triggers must come from the trigger bump itself (see the matching
    # guard in refresh-data.yml — pushes of rewritten history containing an old
    # trigger commit would otherwise re-fire this).
    if: >-
      github.event_name != 'push' ||
      contains(toJSON(github.event.head_commit.modified), '.github/trigger/probe-ebird') ||
      contains(toJSON(github.event.head_commit.added), '.github/trigger/probe-ebird')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Probe bar-chart endpoint
        env:
          EBIRD_COOKIE: ${{ secrets.EBIRD_COOKIE }}
        # The cookie secret may be pasted as one name=value pair per line (how
        # some DevTools views present it). A newline is an invalid HTTP header
        # value, so rebuild it into a single "a=1; b=2" line before use.
        # NEVER echo the value — the transformed string is no longer masked.
        run: |
          BEFORE_LINES=$(printf '%s\n' "$EBIRD_COOKIE" | wc -l)
          EBIRD_COOKIE=$(printf '%s\n' "$EBIRD_COOKIE" | tr -d '\r' | awk '
            { sub(/^[Cc][Oo][Oo][Kk][Ii][Ee]:[ \t]*/, ""); gsub(/[ \t]+$/, ""); gsub(/;+$/, "");
              if ($0 == "") next; if (n++) printf "; "; printf "%s", $0 }')
          export EBIRD_COOKIE
          echo "cookie: $BEFORE_LINES line(s) in secret -> ${#EBIRD_COOKIE} chars after joining"
          node frame/scripts/build-counties.mjs probe
