# Regenerates the offline basemap data that needs open internet (the sandbox
# can only reach GitHub): real reservoir shorelines from OpenStreetMap
# (gen-water-shapes.mjs) and, with [full] in the trigger commit message, the
# Natural Earth layers too (gen-basemap.mjs). Commits the result back to the
# branch that triggered it.
#
# PUSH-TO-TRIGGER (see refresh-data.yml): bump .github/trigger/gen-basemap on
# a claude/* branch and push — no UI, no API. No secrets needed: both sources
# are public. OSM data is ODbL — keep the attribution in About + README.
name: Generate basemap data

on:
  workflow_dispatch:
  push:
    branches: [ 'claude/**' ]
    paths: [ '.github/trigger/gen-basemap' ]

concurrency: gen-basemap

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Push triggers must come from the trigger bump itself (see refresh-data.yml)
    # so a rewritten-history push carrying an old trigger commit can't re-fire.
    if: >-
      github.event_name != 'push' ||
      contains(toJSON(github.event.head_commit.modified), '.github/trigger/gen-basemap') ||
      contains(toJSON(github.event.head_commit.added), '.github/trigger/gen-basemap')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Fetch reservoir shorelines from OpenStreetMap (Overpass)
        id: overpass
        working-directory: frame
        continue-on-error: true
        run: node scripts/gen-water-shapes.mjs
      # Deterministic fallback: if Overpass is rate-limiting, download the
      # Geofabrik CA+NV extracts (the bulk channel OSM provides precisely so
      # nobody hammers Overpass), filter water polygons locally, and rerun the
      # same matcher from the file. Cannot be rate-limited.
      - name: Fallback — Geofabrik extract
        if: steps.overpass.outcome == 'failure'
        working-directory: frame
        run: |
          sudo apt-get update -q && sudo apt-get install -qy osmium-tool
          curl -fsSLo /tmp/ca.osm.pbf https://download.geofabrik.de/north-america/us/california-latest.osm.pbf
          curl -fsSLo /tmp/nv.osm.pbf https://download.geofabrik.de/north-america/us/nevada-latest.osm.pbf
          osmium tags-filter /tmp/ca.osm.pbf nwr/natural=water -o /tmp/water-ca.osm.pbf
          osmium tags-filter /tmp/nv.osm.pbf nwr/natural=water -o /tmp/water-nv.osm.pbf
          osmium export /tmp/water-ca.osm.pbf -f geojsonseq -o /tmp/water.geojsonseq
          osmium export /tmp/water-nv.osm.pbf -f geojsonseq -o /tmp/water-nv.geojsonseq
          cat /tmp/water-nv.geojsonseq >> /tmp/water.geojsonseq
          node scripts/gen-water-shapes.mjs --from /tmp/water.geojsonseq
      - name: Regenerate Natural Earth layers (only if asked)
        if: contains(github.event.head_commit.message, '[full]')
        working-directory: frame
        run: node scripts/gen-basemap.mjs
      - name: Commit if the data changed
        run: |
          git config user.name "basemap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add frame/src/data/water-shapes.js frame/src/data/basemap.js
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "Basemap data: reservoir shorelines from OpenStreetMap (ODbL, (c) OpenStreetMap contributors) — generated by gen-basemap.yml on a runner"
          # The session may push to the branch while this runs — rebase, don't race.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
