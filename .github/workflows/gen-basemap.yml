# Regenerates the offline basemap data that needs open internet (the sandbox
# can only reach GitHub): real reservoir shorelines from OpenStreetMap
# (gen-water-shapes.mjs) and, with [full] in the trigger commit message, the
# Natural Earth layers too (gen-basemap.mjs). Commits the result back to the
# branch that triggered it.
#
# PUSH-TO-TRIGGER (see refresh-data.yml): bump .github/trigger/gen-basemap on
# a claude/* branch and push — no UI, no API. No secrets needed: both sources
# are public. OSM data is ODbL — keep the attribution in About + README.
name: Generate basemap data

on:
  workflow_dispatch:
  push:
    branches: [ 'claude/**' ]
    paths: [ '.github/trigger/gen-basemap' ]

concurrency: gen-basemap

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch reservoir shorelines from OpenStreetMap
        working-directory: frame
        run: node scripts/gen-water-shapes.mjs
      - name: Regenerate Natural Earth layers (only if asked)
        if: contains(github.event.head_commit.message, '[full]')
        working-directory: frame
        run: node scripts/gen-basemap.mjs
      - name: Commit if the data changed
        run: |
          git config user.name "basemap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add frame/src/data/water-shapes.js frame/src/data/basemap.js
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "Basemap data: reservoir shorelines from OpenStreetMap (ODbL, (c) OpenStreetMap contributors) — generated by gen-basemap.yml on a runner"
          # The session may push to the branch while this runs — rebase, don't race.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
