      <stop offset="0" stop-color="#1b2a4a"/>
      <stop offset="1" stop-color="#0f1526"/>
    </linearGradient>
    <linearGradient id="bird" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc46b"/>
      <stop offset="1" stop-color="#f28c4f"/>
