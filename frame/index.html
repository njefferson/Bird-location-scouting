<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ebe1cf" />
  <!-- Apply the stored theme before first paint so Dawn Mode never flashes. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('frame.theme');
        if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', document.documentElement.dataset.theme === 'dark' ? '#141210' : '#ebe1cf');
      } catch (e) {}
    })();
  </script>
  <title>Frame — bird photography hotspot planner</title>
  <meta name="description" content="Where to go, in which month, to photograph which birds — ranked by photographic opportunity. Free, offline, no account." />
  <!-- Social / link-preview cards (Open Graph + Twitter). Absolute URLs: link
       crawlers (iMessage, WhatsApp, Facebook, Twitter/X, Slack) fetch these
       over the network and don't run the service worker, so the image must be a
       real file at the production origin (frame/social-preview.png → served at
       the site root). Update social-preview.png via scripts card + headless
       screenshot; keep it 1200×630. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Frame" />
  <meta property="og:title" content="Frame — bird photography hotspot planner" />
  <meta property="og:description" content="Where to go, in which month, to photograph which birds — ranked by photographic opportunity. Free, offline, no account, no install." />
  <meta property="og:url" content="https://bird-location-scouting.pages.dev/" />
  <meta property="og:image" content="https://bird-location-scouting.pages.dev/social-preview.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Frame — a warm-lit bird by the water inside camera framing marks, beside the wordmark and tagline." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Frame — bird photography hotspot planner" />
  <meta name="twitter:description" content="Where to go, in which month, to photograph which birds. Free, offline, no account." />
  <meta name="twitter:image" content="https://bird-location-scouting.pages.dev/social-preview.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>

  <main id="app" class="view" tabindex="-1"><p class="empty">Loading…</p></main>
  <nav id="tabs" class="tabs" aria-label="Main"></nav>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
